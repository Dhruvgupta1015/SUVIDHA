<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Blue square background -->
  <rect width="64" height="64" rx="12" fill="#1D4ED8"/>

  <!-- Government building / pillared structure -->
  <!-- Roof / pediment triangle -->
  <polygon points="12,26 32,14 52,26" fill="white" opacity="0.95"/>

  <!-- Entablature / frieze bar -->
  <rect x="12" y="26" width="40" height="4" rx="1" fill="white" opacity="0.95"/>

  <!-- Three columns -->
  <rect x="17" y="30" width="5" height="18" rx="1" fill="white" opacity="0.90"/>
  <rect x="29.5" y="30" width="5" height="18" rx="1" fill="white" opacity="0.90"/>
  <rect x="42" y="30" width="5" height="18" rx="1" fill="white" opacity="0.90"/>

  <!-- Base / stylobate -->
  <rect x="10" y="48" width="44" height="4" rx="1" fill="white" opacity="0.95"/>

  <!-- Steps -->
  <rect x="8" y="52" width="48" height="3" rx="1" fill="white" opacity="0.70"/>
</svg>